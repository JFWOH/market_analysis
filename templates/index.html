<!DOCTYPE html>
<html>
<head>
    <title>Market Analysis Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container mt-4">
        <h1>Real-Time Market Analysis</h1>
        <div class="row">
            <!-- Mini Indices Panel -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>Mini Indices (Ibovespa)</h3>
                    </div>
                    <div class="card-body">
                        <p><strong>Current Trend:</strong> <span id="indices-trend"></span></p>
                        <p><strong>Last Price:</strong> <span id="indices-price"></span></p>
                        <h4>Trading Signals:</h4>
                        <div id="indices-signals"></div>
                    </div>
                </div>
            </div>
            
            <!-- Mini Dolar Panel -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>Mini Dolar (USD/BRL)</h3>
                    </div>
                    <div class="card-body">
                        <p><strong>Current Trend:</strong> <span id="dolar-trend"></span></p>
                        <p><strong>Last Price:</strong> <span id="dolar-price"></span></p>
                        <h4>Trading Signals:</h4>
                        <div id="dolar-signals"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="mt-3 text-muted">Last update: <span id="last-update"></span></p>
    </div>

    <script>
        // Connect to Socket.IO server
        const socket = io();
        
        // Handle market updates
        socket.on('market_update', function(data) {
            // Update Mini Indices data
            if (data.indices) {
                document.getElementById('indices-trend').textContent = data.indices.tendencia;
                document.getElementById('indices-price').textContent = data.indices.ultimo_preco.toFixed(2);
                
                // Display signals
                const indicesSignalsElement = document.getElementById('indices-signals');
                indicesSignalsElement.innerHTML = '';
                
                if (data.indices.sinais && data.indices.sinais.length > 0) {
                    data.indices.sinais.forEach(signal => {
                        const signalDiv = document.createElement('div');
                        signalDiv.className = signal.tipo === 'Compra' ? 'alert alert-success' : 'alert alert-danger';
                        signalDiv.innerHTML = `
                            <strong>${signal.tipo} (${signal.estrategia}):</strong> ${signal.descricao}<br>
                            Target Price: ${signal.preco_alvo.toFixed(2)} | Stop Loss: ${signal.stop_loss.toFixed(2)}
                        `;
                        indicesSignalsElement.appendChild(signalDiv);
                    });
                } else {
                    indicesSignalsElement.innerHTML = '<p>No trading signals at the moment.</p>';
                }
            }
            
            // Update Mini Dolar data
            if (data.dolar) {
                document.getElementById('dolar-trend').textContent = data.dolar.tendencia;
                document.getElementById('dolar-price').textContent = data.dolar.ultimo_preco.toFixed(4);
                
                // Display signals
                const dolarSignalsElement = document.getElementById('dolar-signals');
                dolarSignalsElement.innerHTML = '';
                
                if (data.dolar.sinais && data.dolar.sinais.length > 0) {
                    data.dolar.sinais.forEach(signal => {
                        const signalDiv = document.createElement('div');
                        signalDiv.className = signal.tipo === 'Compra' ? 'alert alert-success' : 'alert alert-danger';
                        signalDiv.innerHTML = `
                            <strong>${signal.tipo} (${signal.estrategia}):</strong> ${signal.descricao}<br>
                            Target Price: ${signal.preco_alvo.toFixed(4)} | Stop Loss: ${signal.stop_loss.toFixed(4)}
                        `;
                        dolarSignalsElement.appendChild(signalDiv);
                    });
                } else {
                    dolarSignalsElement.innerHTML = '<p>No trading signals at the moment.</p>';
                }
            }
            
            // Update timestamp
            document.getElementById('last-update').textContent = data.last_update;
        });
    </script>
</body>
</html>
